<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Range Slider - EaseMotion</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }

    .container {
      text-align: center;
      max-width: 1000px;
      padding: 2rem;
    }

    h1 {
      color: #ffffff;
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 30px rgba(102, 126, 234, 0.5);
    }

    .subtitle {
      color: #a0aec0;
      font-size: 1.125rem;
      margin-bottom: 3rem;
    }

    .info-text {
      color: #667eea;
      font-size: 0.875rem;
      margin-top: 2rem;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Range Slider</h1>
    <p class="subtitle">Styled range sliders with custom thumbs and track gradients</p>
    
    <div class="slider-container">
      <div class="slider-wrapper">
        <div class="slider-item">
          <span class="slider-label">Default Size</span>
          <input type="range" class="range-slider" min="0" max="100" value="50" id="slider-default">
          <span class="slider-value" id="value-default">50</span>
        </div>
      </div>

      <div class="slider-wrapper">
        <div class="slider-item">
          <span class="slider-label">Small Size</span>
          <input type="range" class="range-slider slider-sm" min="0" max="100" value="30" id="slider-sm">
          <span class="slider-value" id="value-sm">30</span>
        </div>
      </div>

      <div class="slider-wrapper">
        <div class="slider-item">
          <span class="slider-label">Large Size</span>
          <input type="range" class="range-slider slider-lg" min="0" max="100" value="70" id="slider-lg">
          <span class="slider-value" id="value-lg">70</span>
        </div>
      </div>

      <div class="slider-wrapper">
        <div class="slider-item">
          <span class="slider-label">Cyan Color</span>
          <input type="range" class="range-slider slider-cyan" min="0" max="100" value="60" id="slider-cyan">
          <span class="slider-value" id="value-cyan">60</span>
        </div>
      </div>

      <div class="slider-wrapper">
        <div class="slider-item">
          <span class="slider-label">Green Color</span>
          <input type="range" class="range-slider slider-green" min="0" max="100" value="40" id="slider-green">
          <span class="slider-value" id="value-green">40</span>
        </div>
      </div>

      <div class="slider-wrapper">
        <div class="slider-item">
          <span class="slider-label">Pink Color</span>
          <input type="range" class="range-slider slider-pink" min="0" max="100" value="80" id="slider-pink">
          <span class="slider-value" id="value-pink">80</span>
        </div>
      </div>

      <div class="slider-wrapper">
        <div class="slider-item">
          <span class="slider-label">Price Filter ($0 - $1000)</span>
          <input type="range" class="range-slider" min="0" max="1000" value="500" step="10" id="slider-price">
          <span class="slider-value" id="value-price">$500</span>
        </div>
      </div>

      <div class="slider-wrapper">
        <div class="slider-item">
          <span class="slider-label">Volume (0 - 100)</span>
          <input type="range" class="range-slider slider-green" min="0" max="100" value="75" id="slider-volume">
          <span class="slider-value" id="value-volume">75%</span>
        </div>
      </div>
    </div>

    <p class="info-text">Drag the sliders to see the custom thumb and track styling</p>
  </div>

  <script>
    // Update slider values on input
    const sliders = [
      { slider: 'slider-default', value: 'value-default', prefix: '' },
      { slider: 'slider-sm', value: 'value-sm', prefix: '' },
      { slider: 'slider-lg', value: 'value-lg', prefix: '' },
      { slider: 'slider-cyan', value: 'value-cyan', prefix: '' },
      { slider: 'slider-green', value: 'value-green', prefix: '' },
      { slider: 'slider-pink', value: 'value-pink', prefix: '' },
      { slider: 'slider-price', value: 'value-price', prefix: '$' },
      { slider: 'slider-volume', value: 'value-volume', prefix: '', suffix: '%' }
    ];

    sliders.forEach(({ slider, value, prefix, suffix }) => {
      const sliderEl = document.getElementById(slider);
      const valueEl = document.getElementById(value);
      
      sliderEl.addEventListener('input', () => {
        valueEl.textContent = prefix + sliderEl.value + (suffix || '');
      });
    });
  </script>
</body>
</html>
